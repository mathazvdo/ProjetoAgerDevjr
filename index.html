<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC - Gestão de Funcionários</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
</head>

<body>

    <div class="container">

        <header class="header">
            <h1>SOC - Gestão de Funcionários</h1>
            <p>CRUD com Spring Boot + JDBC + MySQL</p>

            <a id="btnVoltar" class="btn-voltar-circle hidden" onclick="voltarTelaInicial()" title="Voltar">

                <i class="fa-solid fa-arrow-left"></i>

            </a>
        </header>



        <div class="content">

            <div class="form-section">

                <h2 id="tituloFormulario">Cadastro de Funcionário</h2>

                <input type="number" id="codigo" placeholder="Código">

                <input type="text" id="nome" placeholder="Nome">

                <input type="text" id="cpf" placeholder="CPF">

                <input type="text" id="cargo" placeholder="Cargo">

                <input type="date" id="dataNascimento">

                <button id="btnCadastrar" class="btn cadastrar" onclick="cadastrarFuncionario()">
                    Cadastrar
                </button>

                <button class="btn atualizar" onclick="atualizarFuncionario()">
                    Atualizar
                </button>

                <button class="btn limpar" onclick="limparCampos()">
                    Limpar
                </button>

            </div>

            <div class="list-section" id="secaoListagem">

                <h2>Funcionários</h2>

                <div class="search-box">

                    <input type="number" id="buscarCodigo" placeholder="Buscar por código">

                    <button onclick="buscarFuncionario()">
                        Buscar
                    </button>

                </div>

                <button class="btn listar" onclick="abrirTelaFuncionarios()">
                    Listar Todos
                </button>

                <div id="loader" class="loader hidden">
                    Carregando funcionários...
                </div>

                <div id="listaFuncionarios"></div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

    <script>

        const funcionarioEditar = localStorage.getItem("funcionarioEditar");

        if (funcionarioEditar) {

            const funcionario = JSON.parse(funcionarioEditar);

            document.getElementById("codigo").value = funcionario.codigo;
            document.getElementById("nome").value = funcionario.nome;
            document.getElementById("cpf").value = funcionario.cpf;
            document.getElementById("cargo").value = funcionario.cargo;
            document.getElementById("dataNascimento").value = funcionario.dataNascimento;

            // bloqueia alteração do código
            document.getElementById("codigo").disabled = true;

            // esconde botão cadastrar
            document.getElementById("btnCadastrar").style.display = "none";

            // mostra botão voltar
            document.getElementById("btnVoltar")
                .classList.remove("hidden");

            // altera título
            document.getElementById("tituloFormulario")
                .innerText = "Editar Funcionário";

            // esconde listagem
            document.getElementById("secaoListagem")
                .style.display = "none";

            localStorage.removeItem("funcionarioEditar");
        }

    </script>

</body>

</html>
